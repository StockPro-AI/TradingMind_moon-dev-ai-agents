services:
  app:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r api/requirements.txt && python api/main.py"
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
